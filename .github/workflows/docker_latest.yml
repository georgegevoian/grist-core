name: Push latest Docker image

on:
  push:
    # Trigger if latest_candidate updates. This is automatically done by another
    # workflow whenever tests pass on main - but events don't chain without using
    # personal access tokens so we just use a cron job.
    branches: [ latest_candidate ]
  schedule:
    # Run at 5:41 UTC daily
    - cron:  '41 5 * * *'
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch from which to create the latest Docker image (default: latest_candidate)"
        type: string
        required: true
        default: latest_candidate
      disable_tests:
        description: "Should the tests be skipped?"
        type: boolean
        required: True
        default: False
      platforms:
        description: "Platforms to build"
        type: choice
        required: True
        options:
          - linux/amd64
          - linux/arm64/v8
          - linux/amd64,linux/arm64/v8
        default: linux/amd64,linux/arm64/v8
      tag:
        description: "Tag for the resulting images"
        type: string
        required: True
        default: 'latest'

env:
  BRANCH: ${{ inputs.branch || 'latest_candidate' }}
  PLATFORMS: ${{ inputs.platforms || 'linux/amd64,linux/arm64/v8' }}
  TAG: ${{ inputs.tag || 'latest' }}
  DOCKER_HUB_OWNER: ${{ vars.DOCKER_HUB_OWNER || github.repository_owner }}

# Serialize publishes so the full-edition build-sequence allocation (which lists S3 for
# today's highest sequence, then writes the next one) can't race a concurrent run.
# See buildtools/publish-grist-full-edition.sh.
concurrency:
  group: publish-nightly
  cancel-in-progress: false

jobs:
  # Translate the `platforms` selection into a build matrix (one leg per architecture,
  # each pinned to a native runner). This lets a manual single-arch run build only the
  # selected architecture, while the default builds both natively (no QEMU).
  setup:
    name: Compute build matrix
    runs-on: ubuntu-22.04
    if: ${{ vars.RUN_DAILY_BUILD }}
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Build settings
        run: |
          echo "Branch: $BRANCH"
          echo "Platforms: $PLATFORMS"
          echo "Docker Hub Owner: $DOCKER_HUB_OWNER"
          echo "Tag: $TAG"

      - name: Compute matrix from selected platforms
        id: set-matrix
        run: |
          include='[]'
          if [[ "$PLATFORMS" == *"linux/amd64"* ]]; then
            include=$(jq -c '. + [{"arch":"amd64","platform":"linux/amd64","runner":"ubuntu-22.04"}]' <<< "$include")
          fi
          if [[ "$PLATFORMS" == *"linux/arm64"* ]]; then
            include=$(jq -c '. + [{"arch":"arm64","platform":"linux/arm64/v8","runner":"ubuntu-22.04-arm"}]' <<< "$include")
          fi
          echo "matrix={\"include\":$include}" >> "$GITHUB_OUTPUT"

  # Build, (on amd64) test, and push the `grist` and `grist-ee` images (these bundle the
  # ext/ extensions) for each selected architecture natively on its own runner, pushing
  # by digest (no tag yet). The arm64 leg runs on a free public-repo arm64 runner, so no
  # QEMU is needed. Tests run only on the amd64 leg (preserving prior behaviour). The
  # per-arch digests are uploaded as artifacts for the merge job.
  build:
    name: Build ${{ matrix.arch }} grist and grist-ee (push by digest)
    runs-on: ${{ matrix.runner }}
    needs: setup
    if: ${{ vars.RUN_DAILY_BUILD }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
      - name: Free disk space
        run: |
          echo "Disk space before cleanup:"
          df -h /
          echo "Removing Android SDK..."
          sudo rm -rf /usr/local/lib/android
          df -h /
          echo "Removing .NET..."
          sudo rm -rf /usr/share/dotnet
          df -h /
          echo "Removing Haskell..."
          sudo rm -rf /usr/local/.ghcup
          df -h /
          echo "Removing Swift..."
          sudo rm -rf /usr/share/swift
          df -h /
          echo "Final disk space:"
          df -h /

      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BRANCH }}

      - name: Add a dummy ext/ directory
        run:
          mkdir ext && touch ext/dummy

      - name: Check out the ext/ directory
        run: buildtools/checkout-ext-directory.sh grist-ee

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # On the amd64 leg, build the image into the local daemon so the test suite below
      # can run against it. The later push-by-digest build reuses these cached layers.
      - name: Prepare image for testing
        if: ${{ matrix.arch == 'amd64' && !inputs.disable_tests }}
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          platforms: ${{ matrix.platform }}
          tags: ${{ env.DOCKER_HUB_OWNER }}/grist:${{ env.TAG }}
          cache-from: type=gha,scope=grist-${{ matrix.arch }}
          cache-to: type=gha,scope=grist-${{ matrix.arch }},mode=max
          build-contexts: ext=ext

      - name: Use Node.js for testing
        if: ${{ matrix.arch == 'amd64' && !inputs.disable_tests }}
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Set up Python for testing - maybe not needed
        if: ${{ matrix.arch == 'amd64' && !inputs.disable_tests }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python packages
        if: ${{ matrix.arch == 'amd64' && !inputs.disable_tests }}
        run: |
          pip install virtualenv
          yarn run install:python

      - name: Install Node.js packages
        if: ${{ matrix.arch == 'amd64' && !inputs.disable_tests }}
        run: yarn install:docker

      - name: Disable the ext/ directory
        if: ${{ matrix.arch == 'amd64' && !inputs.disable_tests }}
        run: mv ext/ ext-disabled/

      - name: Build Node.js code
        if: ${{ matrix.arch == 'amd64' && !inputs.disable_tests }}
        run: yarn run build

      - name: Install Google Chrome and chromedriver
        if: ${{ matrix.arch == 'amd64' && !inputs.disable_tests }}
        run: buildtools/install_chrome_for_tests.sh -y

      - name: Run tests with default settings
        if: ${{ matrix.arch == 'amd64' && !inputs.disable_tests }}
        run: |
          export TEST_IMAGE=${{ env.DOCKER_HUB_OWNER }}/grist:${{ env.TAG }}
          export VERBOSE=1
          export DEBUG=1
          export MOCHA_WEBDRIVER_HEADLESS=1
          yarn run test:docker

      - name: Run some tests with gvisor and python
        if: ${{ matrix.arch == 'amd64' && !inputs.disable_tests }}
        run: |
          export TEST_IMAGE=${{ env.DOCKER_HUB_OWNER }}/grist:${{ env.TAG }}
          export VERBOSE=1
          export DEBUG=1
          export MOCHA_WEBDRIVER_HEADLESS=1
          export GREP_TESTS='should support basic editing'
          export TEST_DOCKER_OPTIONS='-e GRIST_SANDBOX_FLAVOR=gvisor -e PYTHON_VERSION_ON_CREATION=3'
          yarn run test:docker

      - name: Re-enable the ext/ directory
        if: ${{ matrix.arch == 'amd64' && !inputs.disable_tests }}
        run: mv ext-disabled/ ext/

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push grist by digest
        id: build_grist
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: GRIST_ALLOW_AUTOMATIC_VERSION_CHECKING=true
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.DOCKER_HUB_OWNER }}/grist,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=grist-${{ matrix.arch }}
          cache-to: type=gha,scope=grist-${{ matrix.arch }},mode=max
          build-contexts: ext=ext

      # grist-ee is `grist` + one ENV layer. It builds FROM the grist image we just pushed,
      # referenced by digest (BASE_REF) so it resolves from the registry without a tag.
      - name: Build and push grist-ee by digest
        id: build_grist_ee
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ext/Dockerfile
          build-args: |
            BASE_REF=${{ env.DOCKER_HUB_OWNER }}/grist@${{ steps.build_grist.outputs.digest }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.DOCKER_HUB_OWNER }}/grist-ee,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=grist-ee-${{ matrix.arch }}
          cache-to: type=gha,scope=grist-ee-${{ matrix.arch }},mode=max

      - name: Export digests
        run: |
          mkdir -p /tmp/digests/grist /tmp/digests/grist-ee
          grist_digest="${{ steps.build_grist.outputs.digest }}"
          grist_ee_digest="${{ steps.build_grist_ee.outputs.digest }}"
          touch "/tmp/digests/grist/${grist_digest#sha256:}"
          touch "/tmp/digests/grist-ee/${grist_ee_digest#sha256:}"

      - name: Upload digests
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          retention-days: 1
          if-no-files-found: error

  # Assemble the per-arch digests into multi-arch `grist` and `grist-ee` manifests under
  # all the real tags, then package the just-published `grist` image as a complete
  # full-edition payload and publish it for grist-oss to download and run at runtime. The
  # package's checksums are exposed as job outputs (consumed by the grist-oss job).
  merge-grist:
    name: Merge grist/grist-ee manifests and publish the full-edition package
    runs-on: ubuntu-22.04
    needs: build
    if: ${{ vars.RUN_DAILY_BUILD }}
    outputs:
      ref: ${{ steps.ext_meta.outputs.ref }}
      full_url_amd64: ${{ steps.pkg.outputs.full_url_amd64 }}
      full_url_arm64: ${{ steps.pkg.outputs.full_url_arm64 }}
      full_sha256_amd64: ${{ steps.pkg.outputs.full_sha256_amd64 }}
      full_sha256_arm64: ${{ steps.pkg.outputs.full_sha256_arm64 }}
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/share/swift

      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BRANCH }}

      - name: Read full-edition metadata
        id: ext_meta
        run: |
          # ref is the grist-core commit, baked into grist-oss as GRIST_FULL_EDITION_REF
          # (the on-disk stamp). It uniquely identifies the payload (grist-core@commit pins
          # ext via .grist-ee-version), so the stamp changes on every upgrade; the download
          # URL itself is allocated and baked by the publish step below. HEAD is the
          # checked-out commit (here that is the `branch` input tip, so use git rev-parse,
          # not github.sha).
          echo "ref=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKER_HUB_OWNER }}/grist
          tags: |
            ${{ env.TAG }}

      - name: Docker meta (EE)
        id: meta_ee
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKER_HUB_OWNER }}/grist-ee
          tags: |
            ${{ env.TAG }}

      - name: Create grist manifest list and push
        working-directory: /tmp/digests/grist
        env:
          METADATA_JSON: ${{ steps.meta.outputs.json }}
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$METADATA_JSON") \
            $(printf '${{ env.DOCKER_HUB_OWNER }}/grist@sha256:%s ' *)

      - name: Create grist-ee manifest list and push
        working-directory: /tmp/digests/grist-ee
        env:
          METADATA_JSON: ${{ steps.meta_ee.outputs.json }}
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$METADATA_JSON") \
            $(printf '${{ env.DOCKER_HUB_OWNER }}/grist-ee@sha256:%s ' *)

      # Package the just-pushed `grist` image as a complete full-edition payload, hash it,
      # and publish it for grist-oss to download and run at runtime. Exposes the per-arch
      # checksums as job outputs (consumed by grist-oss below).
      - name: Build and publish full-edition package
        id: pkg
        # CHANNEL=nightly; LABEL is latest-<commit> (cosmetic filename label, reusing the
        # `latest` tag + the ext_meta commit). The stamp (GRIST_FULL_EDITION_REF) stays the
        # commit, set on the grist-oss build below.
        env:
          IMAGE: ${{ env.DOCKER_HUB_OWNER }}/grist:${{ env.TAG }}
          CHANNEL: nightly
          LABEL: ${{ env.TAG }}-${{ steps.ext_meta.outputs.ref }}
          GRIST_STATIC_HOST: ${{ vars.GRIST_STATIC_HOST || 'https://grist-static.com' }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.GRIST_STATIC_AWS_REGION || 'us-east-1' }}
          GRIST_STATIC_S3_BUCKET: ${{ vars.GRIST_STATIC_S3_BUCKET || 'grist-static' }}
          GRIST_STATIC_S3_PREFIX: ${{ vars.GRIST_STATIC_S3_PREFIX || 'grist-full-edition' }}
        run: buildtools/publish-grist-full-edition.sh

  # Build, (on amd64) test, and push the `grist-oss` image (no bundled ext/) for each
  # selected architecture natively, pushing by digest. It runs after merge-grist so it can
  # bake in the full-edition ref (stamp), the per-arch download URLs, and the freshly
  # computed checksums, enabling runtime conversion into the full edition.
  build-grist-oss:
    name: Build ${{ matrix.arch }} grist-oss (push by digest)
    runs-on: ${{ matrix.runner }}
    needs: [setup, merge-grist]
    if: ${{ vars.RUN_DAILY_BUILD }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
      - name: Free disk space
        run: |
          echo "Disk space before cleanup:"
          df -h /
          echo "Removing Android SDK..."
          sudo rm -rf /usr/local/lib/android
          df -h /
          echo "Removing .NET..."
          sudo rm -rf /usr/share/dotnet
          df -h /
          echo "Removing Haskell..."
          sudo rm -rf /usr/local/.ghcup
          df -h /
          echo "Removing Swift..."
          sudo rm -rf /usr/share/swift
          df -h /
          echo "Final disk space:"
          df -h /

      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BRANCH }}

      # grist-oss does not bundle ext/; a dummy keeps the `ext=ext` build-context happy.
      - name: Add a dummy ext/ directory
        run:
          mkdir ext && touch ext/dummy

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # On the amd64 leg, build into the local daemon so the test suite can run against it.
      # The later push-by-digest build reuses these cached layers.
      - name: Prepare image for testing
        if: ${{ matrix.arch == 'amd64' && !inputs.disable_tests }}
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          platforms: ${{ matrix.platform }}
          tags: ${{ env.DOCKER_HUB_OWNER }}/grist-oss:${{ env.TAG }}
          cache-from: type=gha,scope=grist-oss-${{ matrix.arch }}
          cache-to: type=gha,scope=grist-oss-${{ matrix.arch }},mode=max
          build-contexts: ext=ext

      - name: Use Node.js for testing
        if: ${{ matrix.arch == 'amd64' && !inputs.disable_tests }}
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Set up Python for testing - maybe not needed
        if: ${{ matrix.arch == 'amd64' && !inputs.disable_tests }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python packages
        if: ${{ matrix.arch == 'amd64' && !inputs.disable_tests }}
        run: |
          pip install virtualenv
          yarn run install:python

      - name: Install Node.js packages
        if: ${{ matrix.arch == 'amd64' && !inputs.disable_tests }}
        run: yarn install:docker

      - name: Disable the ext/ directory
        if: ${{ matrix.arch == 'amd64' && !inputs.disable_tests }}
        run: mv ext/ ext-disabled/

      - name: Build Node.js code
        if: ${{ matrix.arch == 'amd64' && !inputs.disable_tests }}
        run: yarn run build

      - name: Install Google Chrome and chromedriver
        if: ${{ matrix.arch == 'amd64' && !inputs.disable_tests }}
        run: buildtools/install_chrome_for_tests.sh -y

      - name: Run tests with default settings
        if: ${{ matrix.arch == 'amd64' && !inputs.disable_tests }}
        run: |
          export TEST_IMAGE=${{ env.DOCKER_HUB_OWNER }}/grist-oss:${{ env.TAG }}
          export VERBOSE=1
          export DEBUG=1
          export MOCHA_WEBDRIVER_HEADLESS=1
          yarn run test:docker

      - name: Run some tests with gvisor and python
        if: ${{ matrix.arch == 'amd64' && !inputs.disable_tests }}
        run: |
          export TEST_IMAGE=${{ env.DOCKER_HUB_OWNER }}/grist-oss:${{ env.TAG }}
          export VERBOSE=1
          export DEBUG=1
          export MOCHA_WEBDRIVER_HEADLESS=1
          export GREP_TESTS='should support basic editing'
          export TEST_DOCKER_OPTIONS='-e GRIST_SANDBOX_FLAVOR=gvisor -e PYTHON_VERSION_ON_CREATION=3'
          yarn run test:docker

      - name: Re-enable the ext/ directory
        if: ${{ matrix.arch == 'amd64' && !inputs.disable_tests }}
        run: mv ext-disabled/ ext/

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push grist-oss by digest
        id: build_grist_oss
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            GRIST_ALLOW_AUTOMATIC_VERSION_CHECKING=false
            GRIST_FULL_EDITION_DIR=/persist/grist-full-edition
            GRIST_FULL_EDITION_REF=${{ needs.merge-grist.outputs.ref }}
            GRIST_FULL_EDITION_URL_AMD64=${{ needs.merge-grist.outputs.full_url_amd64 }}
            GRIST_FULL_EDITION_URL_ARM64=${{ needs.merge-grist.outputs.full_url_arm64 }}
            GRIST_FULL_EDITION_SHA256_AMD64=${{ needs.merge-grist.outputs.full_sha256_amd64 }}
            GRIST_FULL_EDITION_SHA256_ARM64=${{ needs.merge-grist.outputs.full_sha256_arm64 }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.DOCKER_HUB_OWNER }}/grist-oss,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=grist-oss-${{ matrix.arch }}
          cache-to: type=gha,scope=grist-oss-${{ matrix.arch }},mode=max
          build-contexts: ext=ext

      - name: Export digest
        run: |
          mkdir -p /tmp/digests/grist-oss
          digest="${{ steps.build_grist_oss.outputs.digest }}"
          touch "/tmp/digests/grist-oss/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-oss-${{ matrix.arch }}
          path: /tmp/digests/*
          retention-days: 1
          if-no-files-found: error

  # Assemble the per-arch grist-oss digests into a multi-arch manifest under all the real
  # tags.
  merge-grist-oss:
    name: Merge grist-oss manifest
    runs-on: ubuntu-22.04
    needs: build-grist-oss
    if: ${{ vars.RUN_DAILY_BUILD }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-oss-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKER_HUB_OWNER }}/grist-oss
          tags: |
            ${{ env.TAG }}

      - name: Create grist-oss manifest list and push
        working-directory: /tmp/digests/grist-oss
        env:
          METADATA_JSON: ${{ steps.meta.outputs.json }}
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$METADATA_JSON") \
            $(printf '${{ env.DOCKER_HUB_OWNER }}/grist-oss@sha256:%s ' *)

  update_latest_branch:
    name: Update latest branch
    runs-on: ubuntu-22.04
    needs: [merge-grist, merge-grist-oss]
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.latest_branch }}

      - name: Update latest branch
        uses: ad-m/github-push-action@8407731efefc0d8f72af254c74276b7a90be36e1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: latest
          force: true
